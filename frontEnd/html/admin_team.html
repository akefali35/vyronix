<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VYRONIX | Manage Team</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header class="header">
    <a href="index.html" class="header-logo">
        <img src="../assets/images/logo.png" alt="VYRONIX Logo">
        <span>VYRONIX</span>
    </a>

    <nav class="navbar" id="navbar">
        <a href="index.html#home">Home</a>
        <a href="index.html#services">Services</a>
        <a href="index.html#projects">Projects</a>
        <a href="ourteam.html">Our Team</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="header-actions">
        <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" placeholder="Search">
        </div>

        <div class="header-action-icons">
            <button class="header-icon-btn" aria-label="Messages">
                <i class="bi bi-envelope"></i>
            </button>

            <button class="header-icon-btn" aria-label="Notifications">
                <i class="bi bi-bell"></i>
            </button>
        </div>

        <div class="header-divider"></div>

        <div class="profile-menu">
            <button class="user-avatar" id="profileBtn" aria-label="Open Profile Menu">R</button>

            <div class="profile-dropdown" id="profileDropdown">
                <div class="profile-head">
                    <img src="../assets/images/user.jpg" alt="User Profile">
                    <div>
                        <h4>VYRONIX User</h4>
                        <p>user@vyronix.com</p>
                    </div>
                </div>

                <a href="#">
                    <span><i class="bi bi-person"></i> Profile</span>
                    <i class="bi bi-chevron-right"></i>
                </a>

                <a href="#">
                    <span><i class="bi bi-star"></i> Ratings & Feedback</span>
                    <i class="bi bi-chevron-right"></i>
                </a>

                <a href="#">
                    <span><i class="bi bi-person-plus"></i> Add Account</span>
                    <i class="bi bi-chevron-right"></i>
                </a>

                <button class="logout-btn">
                    <span><i class="bi bi-box-arrow-right"></i> Log Out</span>
                </button>
            </div>
        </div>
    </div>

    <button class="menu-btn" id="menuBtn" aria-label="Open Menu">
        <i class="bi bi-list"></i>
    </button>
</header>

<main>
    <section class="section admin-team-section">

        <div class="section-header">
            <h2>Manage Team</h2>
            <p>Add team members and test how they appear on Our Team page.</p>
        </div>

        <form class="admin-form" id="teamForm">
            <input type="text" id="name" placeholder="Member Name" required>
            <input type="text" id="role" placeholder="Role / Position" required>
            <input type="text" id="image" placeholder="Image URL or path" required>
            <textarea id="description" placeholder="Short Description" required></textarea>
            <button type="submit">Add Member</button>
        </form>

        <div class="team-grid" id="adminTeamGrid"></div>

    </section>
</main>

<script src="../js/admin-team.js"></script>
</body>
</html>
