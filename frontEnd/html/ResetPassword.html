<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VYRONIX | Reset Password</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- External CSS -->
    <link rel="stylesheet" href="../css/ResetPassword.css">
</head>
<body>

<div class="container">

    <!-- ===== LOGO SECTION - TIGHT SPACING ===== -->
    <div class="logo-section">
        <img src="../assets/images/logo.png" alt="VYRONIX Logo" class="logo-icon">
        <span class="brand-name">VYRONIX</span>
    </div>

    <!-- ===== RESET PASSWORD CARD ===== -->
    <div class="card">

        <h1 class="card-title">Reset<br>Password</h1>

        <p class="subtitle-text">
            Enter a new password for your account below.
        </p>

        <form id="resetPasswordForm">
            <div class="form-group">
                <input type="password" name="password" id="password" class="form-input" placeholder="New password" minlength="8" required>
            </div>


            <button type="submit" class="btn-login">Reset Password</button>
        </form>

        <p id="formMessage" class="form-message"></p>

        <p class="signup-text back-to-login">
            Remembered your password? <a href="Login.html" class="signup-link">Log in</a>
        </p>

    </div>

</div>


<script>
const params = new URLSearchParams(window.location.search);
const token = params.get("token");
const messageEl = document.getElementById("formMessage");
const form = document.getElementById("resetPasswordForm");

// No token in the URL at all -> the link is malformed, don't even let them try
if (!token) {
    messageEl.textContent = "This reset link is invalid or missing a token.";
    messageEl.classList.add("error");
    form.querySelectorAll("input, button").forEach(el => el.disabled = true);
}

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    messageEl.textContent = "";
    messageEl.classList.remove("success", "error");

    if (password !== confirmPassword) {
        messageEl.textContent = "Passwords do not match.";
        messageEl.classList.add("error");
        return;
    }

    const API_BASE = "http://localhost:5000/api/auth";

    try {
        const res = await fetch(`${API_BASE}/reset-password`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ token, password })
        });

        const result = await res.json();

        if (res.ok) {
            messageEl.textContent = result.message || "Password reset successfully!";
            messageEl.classList.add("success");
            form.reset();
            setTimeout(() => {
                window.location.href = "Login.html";
            }, 2000);
        } else {
            messageEl.textContent = result.message || "Invalid or expired reset token.";
            messageEl.classList.add("error");
        }

    } catch (err) {
        console.error(err);
        messageEl.textContent = "Server error. Please try again later.";
        messageEl.classList.add("error");
    }
});
</script>

</body>
</html>
