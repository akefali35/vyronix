<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vyronix · refined</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/WelcomePageStyle.css" />
</head>
<body>

  <!-- SPLASH -->
  <div class="splash" id="splash">
   <!-- <div class="splash-welcome">WELCOME</div>
    <div class="logo-wrap" style="width: 585px; max-width: 80%; margin: 0 auto;">
      <img class="splash-logo" src="../assets/images/logo.png" alt="VYRONIX Logo" style="width: 100%; height: auto;" />
    </div>
    <div class="splash-brand">VYRONIX</div>
    <div class="splash-tagline">
      We Build Your Digital Presence<br />
      and apps designed to grow your business
    </div>-->
    <div class="splash-dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- AUTH -->
  <div class="auth" id="auth">
    <div class="auth-container">
      <div class="auth-topbar">
        <div class="mini-logo">
          <img class="splash-logo" src="../assets/images/logo.png" alt="VYRONIX Logo" style="width: 100%; height: auto;" />
        </div>
        <span class="auth-brand-name">VYRONIX</span>
      </div>

      <div class="auth-card">
        <!-- watermark -->
        <div class="card-watermark">
          <div class="wm-v"></div>
          <div class="wm-x"></div>
        </div>
        <button class="auth-btn login" onclick="window.location.href='LogIn.html'">
          <div class="btn-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
              <polyline points="10 17 15 12 10 7" />
              <line x1="15" y1="12" x2="3" y2="12" />
            </svg>
          </div>
          <div class="btn-text">
            <span class="btn-label">Log in</span>
            <span class="btn-sub">Welcome back! Please log in</span>
          </div>
        </button>

        <button class="auth-btn signup" onclick="window.location.href='SignUp.html'">
          <div class="btn-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <line x1="19" y1="8" x2="19" y2="14" />
              <line x1="22" y1="11" x2="16" y2="11" />
            </svg>
          </div>
          <div class="btn-text">
            <span class="btn-label">Sign Up</span>
            <span class="btn-sub">Create a new account</span>
          </div>
        </button>

        <button class="auth-btn guest" onclick="window.location.href='index.html'">
          <div class="btn-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </div>
          <div class="btn-text">
            <span class="btn-label">Browse as guest</span>
            <span class="btn-sub">Continue without an account</span>
          </div>
        </button>
      </div>
    </div>
  </div>

<script>
  const splash = document.getElementById('splash');
  const auth = document.getElementById('auth');

  setTimeout(() => {
    splash.classList.add('hide');
    auth.classList.add('show');
  }, 2500);
</script>

</body>
</html>
