    <script>
        // Fetch designs from the database
        async function fetchDesigns() {
    try {
        const response = await fetch(
            'http://localhost:5000/api/projects?type=UI_DESIGN'
        );

        if (!response.ok) {
            throw new Error('Failed to fetch projects');
        }

        const result = await response.json();

        displayDesigns(result.data.projects);

    } catch (error) {
        console.error('Error fetching projects:', error);

        document.getElementById('digitalGrid').innerHTML =
            '<p>Failed to load projects.</p>';
    }
}

       function displayDesigns(projects) {
        const SERVER_URL = "http://localhost:5000";

    const digitalGrid = document.getElementById('digitalGrid');

    if (!projects || projects.length === 0) {
        digitalGrid.innerHTML = '<p>No UI Design projects found.</p>';
        return;
    }

    digitalGrid.innerHTML = '';

    projects.forEach(project => {
        const card = document.createElement('article');

        card.classList.add('digital-card');

        card.innerHTML = `
           <img src="${
        project.imageUrl
            ? (project.imageUrl.startsWith("http")
                ? project.imageUrl
                : SERVER_URL + project.imageUrl)
            : '../assets/images/default-project.png'
    }" alt="${project.title}">

            <h3>${project.title}</h3>

            <p class="card-desc">
                ${project.description || ''}
            </p>

            <div class="card-actions">
                <a href="${project.githubUrl}" target="_blank" class="btn github">
                    GitHub
                </a>

                <a href="${project.liveUrl}" target="_blank" class="btn live">
                    Live Demo
                </a>
            </div>
        `;

        digitalGrid.appendChild(card);
    });
}
        // Call the function to fetch and display designs on page load
        fetchDesigns();
    </script>
 
<script>
    const avatar = document.getElementById("avatarContent");
    const avatarIcon = document.getElementById("avatarIcon");
    const profileLink = document.getElementById("profileLink");
    const addAccountLink = document.querySelector('.profile-dropdown a[href="SignUp.html"]');
    const logoutBtn = document.getElementById("logoutBtn");
    const profileHead = document.getElementById("profileHead");
    const userNameEl = document.getElementById("userName");
    const userEmailEl = document.getElementById("userEmail");

    const rawToken = localStorage.getItem("accessToken");
    const token = rawToken && rawToken !== "null" && rawToken !== "undefined" ? rawToken : null;
    const storedUser = localStorage.getItem("user") || localStorage.getItem("vyronixUser");
    let user = null;

    try {
        user = storedUser ? JSON.parse(storedUser) : null;
    } catch (error) {
        console.warn("Unable to parse stored user", error);
        user = null;
    }

    const isLoggedIn = Boolean(token || (user && (user.name || user.email)));
    const notifMenu = document.getElementById("notifMenu");
    if (notifMenu) {
        notifMenu.style.display = isLoggedIn ? "flex" : "none";
    }
  function setAvatar(profile) {
    if (!avatar) return;

    if (profile?.profileImage) {
        const url = profile.profileImage.startsWith("http")
            ? profile.profileImage
            : `http://localhost:5000${profile.profileImage}`;

        avatar.innerHTML = `<img src="${url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
    } else if (profile?.firstName) {
        avatar.textContent = profile.firstName.charAt(0).toUpperCase();
    } else {
        avatar.textContent = "👤";
    }

    avatar.style.display = "inline-block";
}

    if (profileLink) {
        profileLink.href = isLoggedIn ? "profile.html" : "LogIn.html";
    }

    if (addAccountLink) {
addAccountLink.hidden = isLoggedIn;
    }

    if (logoutBtn) {
        logoutBtn.style.display = isLoggedIn ? "flex" : "none";

        if (isLoggedIn && !logoutBtn.dataset.logoutAttached) {
            logoutBtn.dataset.logoutAttached = "true";
            logoutBtn.addEventListener("click", () => {
                localStorage.removeItem("accessToken");
                localStorage.removeItem("user");
                localStorage.removeItem("vyronixUser");
                window.location.href = "LogIn.html";
            });
        }
    }

    if (profileHead) {
        const showProfile = Boolean(isLoggedIn);
        profileHead.classList.toggle("hidden", !showProfile);
        profileHead.style.display = showProfile ? "flex" : "none";

        if (showProfile && user) {
            if (userNameEl) userNameEl.textContent = user.name || userNameEl.textContent;
            if (userEmailEl) userEmailEl.textContent = user.email || userEmailEl.textContent;
        }
    }
</script>
<script>
    //connect to the API to get the notifications from the database
    // ---- NEW: fetch notifications when logged in ----
   document.addEventListener("DOMContentLoaded", () => {
    const rawToken = localStorage.getItem("accessToken");

    if (!rawToken) return;
              console.log("Notifications fetch response:");

    fetchNotifications(rawToken);
});
   async function fetchNotifications(token) {
             console.log("Notifications fetch response:");

    try {
        const res = await fetch("http://localhost:5000/api/notifications", {
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            }
        });
         console.log("Notifications fetch response:");
        if (!res.ok) throw new Error("Failed to fetch notifications");

        const data = await res.json();

        renderNotifications(
            data?.data?.notifications || [],
            data?.unreadCount || 0
        );

    } catch (err) {
        console.error("Notifications error:", err);
    }
}
 function renderNotifications(notifications, unreadCount) {
    const notifList = document.getElementById("notifList");
    const notifDot = document.getElementById("notifDot");

    if (!notifList) return;

    // red dot
    if (notifDot) {
        notifDot.style.display = unreadCount > 0 ? "inline-block" : "none";
    }

    // empty state
    if (!notifications || notifications.length === 0) {
        notifList.innerHTML = `<p class="notif-empty">No notifications yet.</p>`;
        return;
    }

    // render list
    notifList.innerHTML = notifications.map(n => `
        <a href="#" class="notif-item ${n.isRead ? "read" : "unread"}">
            <span class="notif-icon">
                <i class="bi bi-bell"></i>
            </span>
            <div>
                <p>${n.message}</p>
                <span class="notif-time">${timeAgo(n.createdAt)}</span>
            </div>
        </a>
    `).join("");
}
    function timeAgo(dateString) {
        const diffMs = Date.now() - new Date(dateString).getTime();
        const mins = Math.floor(diffMs / 60000);
        if (mins < 1) return "just now";
        if (mins < 60) return `${mins} min ago`;
        const hrs = Math.floor(mins / 60);
        if (hrs < 24) return `${hrs} hour${hrs > 1 ? "s" : ""} ago`;
        const days = Math.floor(hrs / 24);
        return `${days} day${days > 1 ? "s" : ""} ago`;
    }

//Mark all notifications as read
 (function () {
       const notifClear = document.getElementById("notifClear");
if (notifClear) {
    notifClear.addEventListener("click", async (e) => {
        e.preventDefault();

        const token = localStorage.getItem("accessToken");
        if (!token) return;

        try {
            const res = await fetch("http://localhost:5000/api/notifications/read-all", {
                method: "PATCH",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                }
            });

            if (!res.ok) throw new Error("Failed to mark all as read");

            const notifDot = document.getElementById("notifDot");
            if (notifDot) notifDot.style.display = "none";

           
            fetchNotifications(token);

        } catch (err) {
            console.error("Mark all as read error:", err);
        }
    });
}


   })();


</script>
<script>
    (function () {
    "use strict";

    const API_BASE = "http://localhost:5000/api";
    const SERVER_ORIGIN = "http://localhost:5000";

    const avatar = document.getElementById("avatarContent");
    const dropdownAvatar = document.getElementById("profileDropdownAvatar");
    const dropdownName = document.getElementById("dropdownName");
    const dropdownEmail = document.getElementById("dropdownEmail");

    const profileLink = document.getElementById("profileLink");
    const logoutBtn = document.getElementById("logoutBtn");

    function getToken() {
        return localStorage.getItem("accessToken");
    }

    // ---------- helper: initials ----------
    function getInitial(profile) {
        if (profile?.firstName) return profile.firstName.charAt(0).toUpperCase();
        if (profile?.email) return profile.email.charAt(0).toUpperCase();
        return "👤";
    }

    // ---------- avatar renderer ----------
    function renderAvatar(el, profile) {
        if (!el) return;

        if (profile?.profileImage) {
            const url = profile.profileImage.startsWith("http")
                ? profile.profileImage
                : `${SERVER_ORIGIN}${profile.profileImage}`;

            el.innerHTML = `<img src="${url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
        } else {
            el.textContent = getInitial(profile);
        }
    }

    // ---------- dropdown ----------
    function renderDropdown(profile) {
        if (dropdownName) {
            dropdownName.textContent =
                `${profile?.firstName || ""} ${profile?.lastName || ""}`.trim() ||
                "VYRONIX User";
        }

        if (dropdownEmail) {
            dropdownEmail.textContent = profile?.email || "user@vyronix.com";
        }

        renderAvatar(dropdownAvatar, profile);
    }

    // ---------- fetch profile ----------
    async function fetchProfile() {
        const token = getToken();
        if (!token) return;

        try {
            const res = await fetch(`${API_BASE}/profile`, {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            });

           const data = await res.json();

if (!res.ok || !data.success) return;

const profile = data.data.profile;

// header avatar (IMPORTANT FIX)
setAvatar(profile);

            // dropdown
            renderDropdown(profile);

            // profile page link
            if (profileLink) profileLink.href = "profile.html";

            // logout
            if (logoutBtn) {
                logoutBtn.style.display = "block";

                logoutBtn.onclick = () => {
                    localStorage.removeItem("accessToken");
                    localStorage.removeItem("user");
                    localStorage.removeItem("vyronixUser");
                    window.location.href = "LogIn.html";
                };
            }

        } catch (err) {
            console.error("Profile fetch error:", err);
        }
    }

    fetchProfile();
})();
</script>
 <script>
        document.getElementById("logoutBtn").addEventListener("click", async () => {
    const token = localStorage.getItem("accessToken");

    if (!token) {
        window.location.href = "LogIn.html";
        return;
    }

    try {
        const res = await fetch("http://localhost:5000/api/auth/logout", {
            method: "POST",
            headers: {
                Authorization: `Bearer ${token}`
            }
        });


        localStorage.removeItem("accessToken");
        localStorage.removeItem("refreshToken");

        if (res.ok) {
            window.location.href = "LogIn.html";
        } else {
            console.warn("Logout request failed, but client cleared session.");
            window.location.href = "LogIn.html";
        }

    } catch (err) {
        console.error("Logout error:", err);

     
        localStorage.removeItem("accessToken");
        localStorage.removeItem("refreshToken");
        window.location.href = "LogIn.html";
    }
});
    </script>
