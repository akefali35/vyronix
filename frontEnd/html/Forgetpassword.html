<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VYRONIX | Forgot Password</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- External CSS -->
    <link rel="stylesheet" href="../css/ForgotPassword.css">
</head>
<body>

<div class="container">

    <!-- ===== LOGO SECTION - TIGHT SPACING ===== -->
    <div class="logo-section">
        <img src="../assets/images/logo.png" alt="VYRONIX Logo" class="logo-icon">
        <span class="brand-name">VYRONIX</span>
    </div>

    <!-- ===== FORGOT PASSWORD CARD ===== -->
    <div class="card">

        <h1 class="card-title">Forgot<br>Password</h1>

        <p class="subtitle-text">
            Enter the email address linked to your account and we'll send you a link to reset your password.
        </p>

        <form id="forgotPasswordForm">
            <div class="form-group">
                <input type="email" name="email" class="form-input" placeholder="Email" required>
            </div>

            <button type="submit" class="btn-login">Send Reset Link</button>
        </form>

        <p id="formMessage" class="form-message"></p>

        <p class="signup-text back-to-login">
            Remembered your password? <a href="Login.html" class="signup-link">Log in</a>
        </p>

    </div>

</div>


<script>
document.getElementById("forgotPasswordForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData(e.target);
    const API_BASE = "http://localhost:5000/api/auth";
    const messageEl = document.getElementById("formMessage");
    const data = {
        email: formData.get("email")
    };

    messageEl.textContent = "";
    messageEl.classList.remove("success", "error");

    try {
        const res = await fetch(`${API_BASE}/forgot-password`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if (res.ok) {
            //Send email to the user with the reset link
            
            messageEl.textContent = result.message || "Reset link sent! Check your email.";
            messageEl.classList.add("success");
            e.target.reset();
        } else {
            messageEl.textContent = result.message || "Something went wrong. Please try again.";
            messageEl.classList.add("error");
        }

    } catch (err) {
        console.error(err);
        messageEl.textContent = "Server error. Please try again later.";
        messageEl.classList.add("error");
    }
});
</script>

</body>
</html>
