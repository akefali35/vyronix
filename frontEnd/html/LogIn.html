<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VYRONIX Login</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="../css/Login.css">
</head>
<body>

<div class="container">

    <!-- ===== LOGO SECTION - TIGHT SPACING ===== -->
    <div class="logo-section">
        <img src="../assets/images/logo.png" alt="VYRONIX Logo" class="logo-icon">
        <span class="brand-name">VYRONIX</span>
    </div>

    <!-- ===== LOGIN CARD ===== -->
    <div class="card">

        <h1 class="card-title">Log in</h1>

        <form id="loginForm">
            <div class="form-group">
<input type="email" name="email" class="form-input" placeholder="Email" required>            </div>

            <div class="form-group">
                <input type="password" name="password" class="form-input" placeholder="Password" required>
            </div>

            <div class="options-row">
              
                <a href="Forgetpassword.html" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn-login">Log in</button>
        </form>

       

        <p class="signup-text">
            Don't have an account? <a href="SignUp.html" class="signup-link">Sign Up</a>
        </p>

    </div>

</div>


<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData(e.target);
    const API_BASE = "http://localhost:5000/api/auth";
    const data = {
        email: formData.get("email"),
        password: formData.get("password"),
        remember: formData.get("remember") ? true : false
    };

    try {
        const res = await fetch(`${API_BASE}/login`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if (res.ok) {
            alert("Login success");
            console.log(result);
            // Store the token in localStorage
            localStorage.setItem("accessToken", result.data.tokens.accessToken);
            localStorage.setItem("vyronixUser", JSON.stringify(result.data.user));
            //check if the user is admin or not
            if (result.data.user.role === "ADMIN") {
                window.location.href = "AdminHomePage.html";
            }
            else {
                window.location.href = "index.html"; // Redirect to dashboard/home page
            }
        } else {
            alert(result.message || "Login failed");
        }

    } catch (err) {
        console.error(err);
        alert("Server error");
    }
});
</script>

</body>
</html>
