<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Requests | VYRONIX</title>
  <link rel="stylesheet" href="../css/AdminHomePage.css">
  <link rel="stylesheet" href="../css/AdminRequest.css">
</head>
<body>
  <div class="shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="dot">⚡</span>
      AdminPro
    </div>
    <div class="nav-section">
      <div class="nav-label">Main</div>
      <div class="nav-item active" onclick="window.location.href='AdminHomePage.html'">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </div>
      <div class="nav-item">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Users
      </div>
      <div class="nav-item" onclick="window.location.href='AdminProjects.html'">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Projects
      </div>
      <div class="nav-item" onclick="window.location.href='AdminRequest.html'">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Requests
      </div>
    </div>
    <div class="nav-section"></div>
  </aside>

    <div class="main" id="Requests">
      <header class="topbar">
        <div class="search-box">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Search requests..." id="requestSearch">
        </div>
        <div class="topbar-right">
          <div class="icon-btn">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <div class="badge-dot">3</div>
          </div>
          <div class="user-chip">
            <div class="avatar">A</div>
            <div class="user-info">
              <div class="user-name">Admin</div>
              <div class="user-role">Request Manager</div>
            </div>
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>
      </header>

      <main class="content">
        <div class="page-header">
          <div>
            <h1>Requests</h1>
            <p>View and manage incoming project requests from clients.</p>
          </div>
        </div>

        <div class="project-toolbar">
          <div class="project-stats">Showing 0 requests</div>
          <div class="filter-group">
            <label for="requestStatusFilter">Status</label>
            <select id="requestStatusFilter">
              <option value="all">All</option>
              <option value="PENDING">PENDING</option>
              <option value="IN_REVIEW">IN_REVIEW</option>
              <option value="ACCEPTED">ACCEPTED</option>
              <option value="REJECTED">REJECTED</option>
            </select>
          </div>
        </div>

        <div class="project-table-wrap">
          <table class="project-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Account Name</th>
                <th>Email</th>
                <th>Project Type</th>
                <th>Client Number</th>
                <th>Description</th>
                <th>Status</th>
                <th>Admin Note</th>
                <th>Created At</th>
                <th>Updated At</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="requestsTableBody">
              <tr><td colspan="11">Loading requests...</td></tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <div class="modal-overlay" id="requestModal">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="requestModalTitle">Edit Request</h2>
        <button class="modal-close" id="closeRequestModal" type="button">&times;</button>
      </div>
      <form class="modal-form" id="requestForm">
        <label>Account Name</label>
        <input type="text" id="formRequestAccountName" disabled>
        <label>Email</label>
        <input type="email" id="formRequestEmail" disabled>
        <label>Project Type</label>
        <input type="text" id="formRequestType" disabled>
        <label>Client Number</label>
        <input type="text" id="formRequestNumber" disabled>
        <label>Description</label>
        <textarea id="formRequestDescription" rows="3" disabled></textarea>
        <label>Status</label>
        <select id="formRequestStatus">
          <option value="PENDING">PENDING</option>
          <option value="IN_REVIEW">IN_REVIEW</option>
          <option value="ACCEPTED">ACCEPTED</option>
          <option value="REJECTED">REJECTED</option>
        </select>
        <label>Admin Note</label>
        <textarea id="formRequestAdminNote" rows="3" placeholder="Enter admin note"></textarea>
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="cancelRequestModal">Cancel</button>
          <button type="submit" class="btn-primary" id="saveRequestBtn">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = "http://localhost:5000/api/project-requests";

    let requests = [];   // full list from server
    let editingId = null;

    const STATUS_CLASS = {
      PENDING: "status-draft",
      IN_REVIEW: "status-active",
      ACCEPTED: "status-active",
      REJECTED: "status-archived",
    };

    const requestsTableBody = document.getElementById("requestsTableBody");
    const requestSearch = document.getElementById("requestSearch");
    const requestStatusFilter = document.getElementById("requestStatusFilter");
    const projectStats = document.querySelector(".project-stats");

    const requestModal = document.getElementById("requestModal");
    const requestForm = document.getElementById("requestForm");
    const closeRequestModal = document.getElementById("closeRequestModal");
    const cancelRequestModal = document.getElementById("cancelRequestModal");

    const formRequestAccountName = document.getElementById("formRequestAccountName");
    const formRequestEmail = document.getElementById("formRequestEmail");
    const formRequestType = document.getElementById("formRequestType");
    const formRequestNumber = document.getElementById("formRequestNumber");
    const formRequestDescription = document.getElementById("formRequestDescription");
    const formRequestStatus = document.getElementById("formRequestStatus");
    const formRequestAdminNote = document.getElementById("formRequestAdminNote");

    function authHeaders(extra = {}) {
      const token = localStorage.getItem("accessToken");
      return {
        Authorization: `Bearer ${token}`,
        ...extra,
      };
    }

    function escapeHtml(value) {
      if (value === null || value === undefined) return "";
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    /* ---------------- LOAD DATA FROM API ---------------- */
    async function loadRequests() {
      try {
        requestsTableBody.innerHTML = `<tr><td colspan="11">Loading requests...</td></tr>`;

        const res = await fetch(API_URL, {
          headers: authHeaders(),
        });

        if (!res.ok) {
          throw new Error(`Failed to load requests (status ${res.status})`);
        }

        const result = await res.json();

        requests = result.data.requests || [];

        applyFilters();
      } catch (error) {
        console.error(error);
        requestsTableBody.innerHTML = `<tr><td colspan="11">Failed to load requests.</td></tr>`;
      }
    }

    /* ---------------- RENDER TABLE ---------------- */
    function renderTable(data) {
      projectStats.textContent = `Showing ${data.length} request${data.length === 1 ? "" : "s"}`;

      if (!data.length) {
        requestsTableBody.innerHTML = `<tr><td colspan="11">No requests found.</td></tr>`;
        return;
      }

      requestsTableBody.innerHTML = data
        .map((r) => {
          const statusClass = STATUS_CLASS[r.status] || "status-draft";

          return `
            <tr data-id="${r.id}">
              <td>${r.id}</td>
              <td>
                <div class="project-cell">
                  <div>
                    <div class="project-title">${escapeHtml(r.accountName)}</div>
                  </div>
                </div>
              </td>
              <td>${escapeHtml(r.email)}</td>
              <td>${escapeHtml(r.projectType)}</td>
              <td>${escapeHtml(r.clientNumber)}</td>
              <td>${escapeHtml(r.description)}</td>
              <td><span class="status-badge ${statusClass}">${escapeHtml(r.status)}</span></td>
              <td>${escapeHtml(r.adminNote) || "-"}</td>
              <td>${escapeHtml(r.createdAt)}</td>
              <td>${escapeHtml(r.updatedAt)}</td>
              <td class="kebab-cell">
                <button class="kebab-btn" type="button" aria-haspopup="true" aria-expanded="false">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
                </button>
                <div class="kebab-menu">
                  <button class="kebab-menu-item edit-btn" type="button" data-id="${r.id}">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                    Edit
                  </button>
                  <button class="kebab-menu-item danger delete-btn" type="button" data-id="${r.id}">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                    Delete
                  </button>
                </div>
              </td>
            </tr>
          `;
        })
        .join("");
    }

    /* ---------------- SEARCH + FILTER (combined) ---------------- */
    function applyFilters() {
      const term = requestSearch.value.trim().toLowerCase();
      const statusValue = requestStatusFilter.value;

      let filtered = requests;

      if (statusValue !== "all") {
        filtered = filtered.filter((r) => r.status === statusValue);
      }

      if (term) {
        filtered = filtered.filter(
          (r) =>
            r.accountName?.toLowerCase().includes(term) ||
            r.email?.toLowerCase().includes(term) ||
            r.projectType?.toLowerCase().includes(term) ||
            r.description?.toLowerCase().includes(term) ||
            r.clientNumber?.toLowerCase().includes(term)
        );
      }

      renderTable(filtered);
    }

    requestSearch.addEventListener("input", applyFilters);
    requestStatusFilter.addEventListener("change", applyFilters);

    /* ---------------- KEBAB MENU (event delegation) ---------------- */
    function closeAllKebabMenus(except) {
      document.querySelectorAll(".kebab-menu.open").forEach((menu) => {
        if (menu !== except) {
          menu.classList.remove("open");
          const btn = menu.previousElementSibling;
          if (btn) {
            btn.classList.remove("active");
            btn.setAttribute("aria-expanded", "false");
          }
        }
      });
    }

    requestsTableBody.addEventListener("click", (event) => {
      const kebabBtn = event.target.closest(".kebab-btn");
      const editBtn = event.target.closest(".edit-btn");
      const deleteBtn = event.target.closest(".delete-btn");

      if (kebabBtn) {
        event.stopPropagation();
        const menu = kebabBtn.nextElementSibling;
        const isOpen = menu.classList.contains("open");
        closeAllKebabMenus();
        if (!isOpen) {
          menu.classList.add("open");
          kebabBtn.classList.add("active");
          kebabBtn.setAttribute("aria-expanded", "true");
        }
        return;
      }

      if (editBtn) {
        closeAllKebabMenus();
        openEditModal(Number(editBtn.dataset.id));
        return;
      }

      if (deleteBtn) {
        closeAllKebabMenus();
        deleteRequest(Number(deleteBtn.dataset.id));
      }
    });

    document.addEventListener("click", () => closeAllKebabMenus());

    /* ---------------- EDIT MODAL ---------------- */
    function toggleRequestModal(open) {
      requestModal.classList.toggle("visible", open);
    }

    function openEditModal(id) {
      const r = requests.find((x) => x.id === id);
      if (!r) return;

      editingId = id;

      formRequestAccountName.value = r.accountName || "";
      formRequestEmail.value = r.email || "";
      formRequestType.value = r.projectType || "";
      formRequestNumber.value = r.clientNumber || "";
      formRequestDescription.value = r.description || "";
      formRequestStatus.value = r.status || "PENDING";
      formRequestAdminNote.value = r.adminNote || "";

      toggleRequestModal(true);
    }

    closeRequestModal.addEventListener("click", () => toggleRequestModal(false));
    cancelRequestModal.addEventListener("click", () => toggleRequestModal(false));
    requestModal.addEventListener("click", (event) => {
      if (event.target === requestModal) toggleRequestModal(false);
    });

    requestForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (editingId === null) return;

      const saveBtn = document.getElementById("saveRequestBtn");
      const originalText = saveBtn.textContent;
      saveBtn.disabled = true;
      saveBtn.textContent = "Saving...";

      try {
        await updateRequestStatus(
          editingId,
          formRequestStatus.value,
          formRequestAdminNote.value.trim()
        );
        toggleRequestModal(false);
      } catch (error) {
        console.error(error);
        alert("Failed to update the request. Please try again.");
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = originalText;
        editingId = null;
      }
    });

    /* ---------------- UPDATE (PATCH) ---------------- */
    async function updateRequestStatus(id, status, adminNote) {
      console.log(`Updating request ${id} to status ${status} with note: ${adminNote}`);
      const res = await fetch(`${API_URL}/${id}/status`, {
        method: "PATCH",
        headers: authHeaders({ "Content-Type": "application/json" }),
        body: JSON.stringify({
          status,
          adminNote,
        }),
      });
       console.log(`Response status: ${res.status}`);
      if (!res.ok) {
        throw new Error(`Failed to update request (status ${res.status})`);
      }

      await loadRequests();
    }

    /* ---------------- DELETE ---------------- */
    async function deleteRequest(id) {
      if (!confirm("Delete this request? This action cannot be undone.")) return;

      try {
        const res = await fetch(`${API_URL}/${id}`, {
          method: "DELETE",
          headers: authHeaders(),
        });

        if (!res.ok) {
          throw new Error(`Failed to delete request (status ${res.status})`);
        }

        requests = requests.filter((r) => r.id !== id);
        applyFilters();
      } catch (error) {
        console.error(error);
        alert("Failed to delete the request. Please try again.");
      }
    }

    /* ---------------- INIT ---------------- */
    loadRequests();
  </script>
</body>
</html>
